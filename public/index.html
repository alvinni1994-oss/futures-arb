<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>期货套利监控</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f7fa;--bg2:#ffffff;--bg3:#f0f2f5;--bg4:#e8ecf0;
  --bd:#dde1e7;--bd2:#c8cdd6;
  --t:#1a1d23;--t2:#4a5568;--t3:#8a93a2;
  --blue:#1a6fdb;--blue-bg:#ebf3ff;--blue-bd:#b3d1ff;
  --green:#16a34a;--green-bg:#f0fdf4;--green-bd:#86efac;
  --red:#dc2626;--red-bg:#fff5f5;--red-bd:#fca5a5;
  --orange:#ea580c;--orange-bg:#fff7ed;--orange-bd:#fdba74;
  --yellow:#ca8a04;--yellow-bg:#fefce8;--yellow-bd:#fde047;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --sidebar-w:220px;
}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Helvetica Neue',sans-serif;min-height:100vh;line-height:1.5}

/* Header */
.hdr{background:#fff;border-bottom:1px solid var(--bd);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr h1{font-size:.95rem;font-weight:700;color:var(--t);letter-spacing:-.2px}
.hdr-tag{font-size:.65rem;background:var(--blue-bg);color:var(--blue);padding:2px 8px;border-radius:10px;font-weight:600;border:1px solid var(--blue-bd)}
.hdr-r{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--t3)}
.rbtn{padding:5px 12px;background:#fff;border:1px solid var(--bd2);border-radius:6px;color:var(--t2);cursor:pointer;font-size:.75rem;font-weight:500;transition:all .15s}
.rbtn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.ysel{background:#fff;border:1px solid var(--bd2);color:var(--t2);padding:4px 8px;border-radius:6px;font-size:.75rem;cursor:pointer}
.lupd-dot{width:7px;height:7px;background:#16a34a;border-radius:50%;display:inline-block;margin-right:3px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Layout */
.layout{display:flex;min-height:calc(100vh - 52px)}

/* Sidebar */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:#fff;border-right:1px solid var(--bd);overflow-y:auto;flex-shrink:0;padding:8px 0}
.cat-label{font-size:.65rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px 4px;margin-top:4px}
.cat-label:first-child{margin-top:0}
.menu-item{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;cursor:pointer;font-size:.78rem;color:var(--t2);border-radius:0;transition:background .12s;gap:6px}
.menu-item:hover{background:var(--bg3)}
.menu-item.active{background:var(--blue-bg);color:var(--blue);font-weight:600;border-right:3px solid var(--blue)}
.menu-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.menu-badge{font-size:.6rem;font-weight:700;padding:1px 5px;border-radius:8px;background:var(--bg3);color:var(--t3);white-space:nowrap;flex-shrink:0}
.menu-badge.badge-sell{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.menu-badge.badge-buy{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.menu-badge.badge-wait{background:var(--bg3);color:var(--t3)}

/* Main content */
.main{flex:1;min-width:0;overflow:auto}
.ct{padding:16px 20px;max-width:900px;margin:0 auto}

/* ===== 顶部决策卡 ===== */
.dc-signal-card{background:#fff;border-radius:12px;box-shadow:var(--shadow-md);margin-bottom:16px;overflow:hidden;border:1px solid var(--bd)}
.dc-signal-bar{padding:14px 18px;background:linear-gradient(135deg,#f1f5f9,#e2e8f0)}
.dc-signal-bar.sell{background:linear-gradient(135deg,#fff5f5,#fee2e2)}
.dc-signal-bar.buy{background:linear-gradient(135deg,#eff6ff,#dbeafe)}
.dc-signal-bar.warn{background:linear-gradient(135deg,#fefce8,#fef9c3)}
.dc-signal-bar.wait{background:linear-gradient(135deg,#f8fafc,#f1f5f9)}
.dc-signal-bar.stop{background:linear-gradient(135deg,#fff7ed,#ffedd5)}
.dc-badge-row{margin-bottom:4px}
.dc-badge{font-size:1rem;font-weight:800;padding:4px 14px;border-radius:20px;display:inline-block}
.badge-wait{background:#f1f5f9;color:#475569}
.badge-buy{background:var(--blue-bg);color:var(--blue)}
.badge-sell{background:var(--red-bg);color:var(--red)}
.badge-warn{background:var(--yellow-bg);color:var(--yellow)}
.badge-stop{background:#fdf2f8;color:#9d174d}
.dc-sub{font-size:.82rem;color:var(--t2);line-height:1.5}
.dc-prices{display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:var(--bg3);border-radius:8px;padding:10px 16px;margin:12px 18px 0}
.dc-price-item{text-align:center}
.dc-price-label{font-size:.65rem;color:var(--t3);margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.dc-price-val{font-size:1.2rem;font-weight:800;color:var(--t)}
.dc-price-sub{font-size:.65rem;color:var(--t3);margin-top:1px}
.dc-price-div{width:1px;background:var(--bd);height:36px;align-self:center}
.dc-diff-val{font-size:1.6rem;font-weight:900}
.dc-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin:12px 18px 0}
.dc-action{background:var(--bg3);border-radius:8px;padding:10px 14px;border:1px solid var(--bd)}
.dca-label{font-size:.62rem;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.dca-val{font-size:.88rem;font-weight:700;line-height:1.5}
.dc-note{font-size:.7rem;color:var(--t3);margin:8px 18px 14px;padding-top:8px;border-top:1px solid var(--bd);line-height:1.6}

/* ===== 面板 ===== */
.panel{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:14px}
.panel-h{font-size:.8rem;font-weight:700;color:var(--t);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;border-bottom:1px solid var(--bg4)}

/* 策略折叠 */
.strat-toggle{background:#fff;border:1px solid var(--bd);border-radius:10px;margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden}
.strat-hdr{padding:11px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:.8rem;font-weight:700;color:var(--t2);user-select:none;transition:background .15s}
.strat-hdr:hover{background:var(--bg3)}
.strat-body{display:none;padding:4px 16px 14px;border-top:1px solid var(--bd)}
.strat-body.open{display:block}
.formula{background:#fff;border-radius:5px;padding:7px 10px;font-family:'SFMono-Regular','Courier New',monospace;font-size:.75rem;color:var(--blue);margin:4px 0;border-left:3px solid var(--blue);line-height:1.7;border:1px solid var(--blue-bd)}
.formula.main{color:var(--t);border-color:var(--orange-bd);background:var(--orange-bg);font-weight:700;font-size:.8rem}
.formula.live{color:var(--orange);border-color:var(--orange-bd);background:var(--orange-bg)}
.sr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bd);font-size:.73rem}
.sr:last-child{border:none}
.sk{color:var(--t3)}.sv{color:var(--t);font-weight:600}
.note-tip{font-size:.68rem;color:var(--t3);margin-top:6px;line-height:1.5;padding:6px 8px;background:#fff;border-radius:4px;border:1px solid var(--bd)}

/* 图表 */
#mc{width:100%;height:260px}#pc{width:100%;height:180px}#hc{width:100%;height:150px}

/* 统计行 */
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:0}
.sbx{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:10px 12px;box-shadow:var(--shadow)}
.sbx h4{font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px;font-weight:700;padding-bottom:5px;border-bottom:1px solid var(--bg4)}

/* 相关性 */
.crr-bar{background:#fff;border:1px solid var(--green-bd);border-radius:8px;padding:8px 14px;margin-bottom:10px;display:flex;align-items:center;flex-wrap:wrap;gap:10px;box-shadow:var(--shadow)}
.crr-label{font-size:.7rem;color:var(--green);font-weight:700;white-space:nowrap}
.crr-items{display:flex;gap:14px;flex-wrap:wrap}
.crr-item{font-size:.74rem;display:flex;align-items:center;gap:4px}
.crr-k{color:var(--t3)}.crr-v{font-weight:700}

/* 加载遮罩 */
.ov{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
.sp{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-t{color:var(--t2);font-size:.88rem;font-weight:500}.ov.hide{display:none}

/* 底部 */
.ft{text-align:center;padding:10px;font-size:.67rem;color:var(--t3);border-top:1px solid var(--bd);margin-top:6px;background:#fff}
.warn-badge{display:inline-block;background:var(--red-bg);color:var(--red);padding:2px 8px;border-radius:4px;font-size:.65rem;font-weight:600;border:1px solid var(--red-bd)}

/* 分位条 */
#pct-bar-wrap{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:10px 16px;margin-bottom:10px;box-shadow:var(--shadow)}

@media(max-width:768px){
  :root{--sidebar-w:0px}
  .sidebar{display:none}
  #mc{height:220px}#pc{height:160px}#hc{height:130px}
  .ct{padding:10px 12px}
  .hdr{padding:0 12px}
  .hdr h1{font-size:.85rem}
  .hdr-tag{display:none}
  .lupd-wrap{display:none}
}
</style>
</head>
<body>
<div class="ov hide" id="ov"><div class="sp"></div><div class="ov-t" id="ovt">加载中...</div></div>

<!-- Header -->
<div class="hdr">
  <div class="hdr-l">
    <h1 id="hdr-title">期货套利监控</h1>
    <span class="hdr-tag">实时监控</span>
  </div>
  <div class="hdr-r">
    <span class="lupd-wrap" style="display:inline-flex;align-items:center;gap:3px">
      <span class="lupd-dot" id="rt-dot" style="background:#94a3b8"></span>
      更新：<span id="lupd">—</span>
    </span>
    <button class="rbtn" onclick="refreshData()">🔄 刷新</button>
    <select class="ysel" id="ys" onchange="onYears()">
      <option value="1">1年</option><option value="2">2年</option>
      <option value="3" selected>3年</option><option value="5">5年</option>
    </select>
  </div>
</div>

<div class="layout">
  <!-- 左侧菜单 -->
  <div class="sidebar" id="sidebar"></div>

  <!-- 右侧内容 -->
  <div class="main">
    <div class="ct">

      <!-- 信号卡 -->
      <div class="dc-signal-card">
        <div id="dc-bar" class="dc-signal-bar wait">
          <div style="display:flex;align-items:flex-start;gap:10px">
            <span id="dc-icon" style="font-size:1.5rem">📊</span>
            <div>
              <div class="dc-badge-row">
                <span id="dc-badge" class="dc-badge badge-wait">加载中...</span>
              </div>
              <div id="dc-sub" class="dc-sub">正在获取数据...</div>
            </div>
          </div>
        </div>
        <!-- 价格卡（动态生成） -->
        <div id="dc-prices" class="dc-prices"></div>
        <!-- 操作指令 -->
        <div class="dc-actions">
          <div class="dc-action"><div class="dca-label">操作指令</div><div class="dca-val" id="dc-op">—</div></div>
          <div class="dc-action"><div class="dca-label">止盈目标</div><div class="dca-val" id="dc-tp">—</div></div>
          <div class="dc-action"><div class="dca-label">止损预警</div><div class="dca-val" id="dc-sl">—</div></div>
          <div class="dc-action"><div class="dca-label">数据日期</div><div class="dca-val" id="dc-date" style="color:var(--t3);font-size:.8rem">—</div></div>
        </div>
        <div class="dc-note" id="dc-note"></div>
      </div>

      <!-- 相关性 -->
      <div class="crr-bar" id="crr"></div>

      <!-- 分位条 -->
      <div id="pct-bar-wrap" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:.7rem;font-weight:700;color:var(--t3)">历史分位位置（近<span id="pct-bar-yrs">3</span>年）</span>
          <span id="pct-bar-val" style="font-size:.85rem;font-weight:800"></span>
        </div>
        <div style="position:relative;height:10px;border-radius:5px;background:linear-gradient(to right,#22c55e,#84cc16,#facc15,#fb923c,#ef4444);overflow:visible">
          <div id="pct-bar-dot" style="position:absolute;top:50%;width:14px;height:14px;border-radius:50%;background:#1a1d23;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);transform:translate(-50%,-50%);transition:left .4s"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:.62rem;color:var(--t3);margin-top:5px">
          <span style="color:var(--green)">偏低/做多</span><span>中性</span><span style="color:var(--red)">偏高/做空</span>
        </div>
      </div>

      <!-- 公式折叠 -->
      <div class="strat-toggle">
        <div class="strat-hdr" onclick="toggleEl('strat-body','strat-arrow')">
          <span>📐 策略公式 · 操作逻辑</span>
          <span id="strat-arrow">▲</span>
        </div>
        <div class="strat-body open" id="strat-body">
          <div style="margin-top:8px">
            <div class="formula main" id="formula-main">—</div>
            <div class="formula live" id="formula-live">实时代入: —</div>
            <div class="note-tip" id="formula-note" style="color:var(--t2)">—</div>
          </div>
        </div>
      </div>

      <!-- 主图 -->
      <div class="panel">
        <div class="panel-h">
          <span id="mct">价差走势</span>
          <select class="ysel" id="ys2" onchange="onYears2()">
            <option value="1">1年</option><option value="2">2年</option>
            <option value="3" selected>3年</option><option value="5">5年</option>
          </select>
        </div>
        <div id="mc"></div>
      </div>

      <!-- 各腿价格副图 -->
      <div class="panel">
        <div class="panel-h"><span id="pct-title">各腿价格走势</span></div>
        <div id="pc"></div>
      </div>

      <!-- 分布直方图 -->
      <div class="panel">
        <div class="panel-h"><span>历史价差分布</span></div>
        <div id="hc"></div>
      </div>

      <!-- 统计表 -->
      <div class="panel">
        <div class="panel-h"><span>📊 趋势图解读</span></div>
        <div class="stats-row" id="stats-row"></div>
      </div>

      <div class="ft">
        数据：新浪期货实时行情 · 历史统计1小时缓存 ·
        <span class="warn-badge">⚠️ 仅供研究参考，不构成投资建议</span>
      </div>
    </div>
  </div>
</div>

<script>
const API=(location.hostname==='localhost'||location.hostname==='127.0.0.1')
  ?`http://${location.host}`:location.origin;

// ===== 策略元数据 =====
const CATEGORY_META = {
  rubber:        { label: "🌿 橡胶套利",    strategies: ["br_nr"] },
  equity_index:  { label: "📈 股指期货",    strategies: ["im_ic"] },
  processing:    { label: "🏭 加工费套利",  strategies: ["ta_px", "pr_bottle", "pr_pf"] },
  cross_product: { label: "🔄 跨品种套利", strategies: ["l_pp", "rm_oi", "m_rm", "rm_c", "lu_fu"] },
};

const STRATEGY_NAME = {
  br_nr: "BR/NR 橡胶套利",
  im_ic: "IM-IC 价差",
  ta_px: "TA加工费",
  pr_bottle: "瓶片加工费",
  pr_pf: "PR-PF 相对加工费",
  l_pp: "L-PP 跨品种",
  rm_oi: "菜粕-菜油",
  m_rm: "豆粕-菜粕",
  rm_c: "菜粕-玉米",
  lu_fu: "LU-FU 跨品种",
};

const STRATEGY_CONFIG = {
  br_nr:     { openHi:1500, strongHi:2500, openLo:-800,  strongLo:-1500, tp:500,  sl:4500 },
  im_ic:     { openHi:500,  strongHi:800,  openLo:-200,  strongLo:-400,  tp:150,  sl:1200 },
  ta_px:     { openHi:200,  strongHi:400,  openLo:-100,  strongLo:-200,  tp:100,  sl:600  },
  pr_bottle: { openHi:1200, strongHi:1500, openLo:500,   strongLo:300,   tp:200,  sl:800  },
  pr_pf:     { openHi:1500, strongHi:2000, openLo:500,   strongLo:300,   tp:300,  sl:2500 },
  l_pp:      { openHi:300,  strongHi:500,  openLo:-300,  strongLo:-500,  tp:100,  sl:700  },
  rm_oi:     { openHi:500,  strongHi:800,  openLo:-200,  strongLo:-400,  tp:150,  sl:1000 },
  m_rm:      { openHi:200,  strongHi:350,  openLo:-200,  strongLo:-350,  tp:80,   sl:500  },
  rm_c:      { openHi:300,  strongHi:500,  openLo:100,   strongLo:-50,   tp:100,  sl:700  },
  lu_fu:     { openHi:300,  strongHi:500,  openLo:-300,  strongLo:-500,  tp:100,  sl:700  },
};

let currentId = "br_nr";
let D = null;
let yrs = 3;
let mc_c, pc_c, hc_c;

// ===== 菜单渲染 =====
function renderMenu() {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";
  for (const [cat, meta] of Object.entries(CATEGORY_META)) {
    const catDiv = document.createElement("div");
    catDiv.className = "cat-label";
    catDiv.textContent = meta.label;
    sidebar.appendChild(catDiv);
    for (const sid of meta.strategies) {
      const item = document.createElement("div");
      item.className = "menu-item" + (sid === currentId ? " active" : "");
      item.id = "menu-" + sid;
      item.onclick = () => selectStrategy(sid);
      item.innerHTML = `<span class="menu-name">${STRATEGY_NAME[sid]}</span><span class="menu-badge badge-wait" id="badge-${sid}">…</span>`;
      sidebar.appendChild(item);
    }
  }
}

// ===== badge 异步加载 =====
async function loadBadge(sid) {
  try {
    const d = await fetch(`${API}/api/spread?id=${sid}&years=3`).then(r => r.ok ? r.json() : null);
    if (!d) return;
    const T = STRATEGY_CONFIG[sid];
    const spread = d.stats.cur;
    let text = "中性", cls = "badge-wait";
    if (spread >= T.strongHi)      { text = "偏高★"; cls = "badge-sell"; }
    else if (spread >= T.openHi)   { text = "偏高";  cls = "badge-sell"; }
    else if (spread <= T.strongLo) { text = "偏低★"; cls = "badge-buy";  }
    else if (spread <= T.openLo)   { text = "偏低";  cls = "badge-buy";  }
    const el = document.getElementById("badge-" + sid);
    if (el) { el.textContent = text; el.className = "menu-badge " + cls; }
  } catch(e) {}
}

function loadAllBadges() {
  for (const meta of Object.values(CATEGORY_META)) {
    for (const sid of meta.strategies) {
      setTimeout(() => loadBadge(sid), 0);
    }
  }
}

// ===== 策略切换 =====
async function selectStrategy(id) {
  currentId = id;
  D = null;
  document.querySelectorAll(".menu-item").forEach(el => el.classList.remove("active"));
  const menuEl = document.getElementById("menu-" + id);
  if (menuEl) menuEl.classList.add("active");
  document.getElementById("hdr-title").textContent = STRATEGY_NAME[id] || "期货套利监控";
  await loadSpread(false);
}

async function loadSpread(silent = false) {
  if (!silent) showOv("加载中...");
  try {
    const r = await fetchWithTimeout(`${API}/api/spread?id=${currentId}&years=${yrs}`, 65000);
    if (!r.ok) throw new Error("HTTP " + r.status);
    D = await r.json();
    if (D.detail) throw new Error(D.detail);
    hideOv();
    renderAll(D);
    document.getElementById("lupd").textContent = new Date().toLocaleTimeString("zh-CN");
    document.getElementById("rt-dot").style.background = D.realtime ? "#16a34a" : "#ca8a04";
  } catch(e) {
    hideOv();
    if (!silent) showOv("加载失败：" + e.message, true);
  }
}

function refreshData() { D = null; loadSpread(false); }
function onYears() { yrs = +document.getElementById("ys").value; document.getElementById("ys2").value = yrs; loadSpread(false); }
function onYears2() { yrs = +document.getElementById("ys2").value; document.getElementById("ys").value = yrs; loadSpread(false); }

// ===== 主渲染 =====
function renderAll(d) {
  renderSignal(d);
  renderPrices(d);
  renderCorr(d);
  renderPctBar(d);
  renderFormula(d);
  renderCharts(d);
  renderStats(d);
}

function renderSignal(d) {
  const T = STRATEGY_CONFIG[currentId] || {};
  const spread = d.stats.cur;
  const mean = d.stats.mean;
  const dpct = d.stats.pct;
  const bar = document.getElementById("dc-bar");
  const badge = document.getElementById("dc-badge");
  const icon = document.getElementById("dc-icon");
  const sub = document.getElementById("dc-sub");
  const opEl = document.getElementById("dc-op");
  const tpEl = document.getElementById("dc-tp");
  const slEl = document.getElementById("dc-sl");
  const noteEl = document.getElementById("dc-note");
  const legs = d.legs || [];
  const unit = d.unit || "";

  const tpHi = mean + T.tp;
  const tpLo = mean - T.tp;

  if (spread >= T.sl || spread <= -T.sl) {
    bar.className = "dc-signal-bar stop";
    badge.className = "dc-badge badge-stop"; badge.textContent = "🛑 止损预警";
    icon.textContent = "🛑";
    sub.textContent = `价差=${spread.toFixed(0)}${unit}，已超过止损线 ±${T.sl}${unit}，请立即检查持仓！`;
    opEl.style.color = "var(--red)"; opEl.textContent = "建议止损出场，立即核查持仓";
    tpEl.textContent = "—"; slEl.style.color = "var(--red)"; slEl.textContent = `已触发 ±${T.sl}${unit}`;
  } else if (spread >= T.strongHi) {
    bar.className = "dc-signal-bar sell";
    badge.className = "dc-badge badge-sell"; badge.textContent = "🔥 强信号：价差偏高";
    icon.textContent = "🔥";
    sub.textContent = `价差=+${spread.toFixed(0)}${unit}（历史P${dpct.toFixed(1)}%），价差极高，可关注做空价差`;
    opEl.style.color = "var(--red)"; opEl.innerHTML = `<b>价差偏高：做空${legs[0]}、做多${legs[1]}</b>`;
    tpEl.style.color = "var(--t3)"; tpEl.textContent = `差值回至 ${tpHi.toFixed(0)}~${tpLo.toFixed(0)}${unit}`;
    slEl.style.color = "var(--red)"; slEl.textContent = `超过 +${T.sl}${unit}`;
  } else if (spread <= T.strongLo) {
    bar.className = "dc-signal-bar buy";
    badge.className = "dc-badge badge-buy"; badge.textContent = "🔥 强信号：价差偏低";
    icon.textContent = "🔥";
    sub.textContent = `价差=${spread.toFixed(0)}${unit}（历史P${dpct.toFixed(1)}%），价差极低，可关注做多价差`;
    opEl.style.color = "var(--green)"; opEl.innerHTML = `<b>价差偏低：做多${legs[0]}、做空${legs[1]}</b>`;
    tpEl.style.color = "var(--t3)"; tpEl.textContent = `差值回至 ${tpLo.toFixed(0)}~${tpHi.toFixed(0)}${unit}`;
    slEl.style.color = "var(--red)"; slEl.textContent = `低于 ${-T.sl}${unit}`;
  } else if (spread >= T.openHi) {
    bar.className = "dc-signal-bar sell";
    badge.className = "dc-badge badge-sell"; badge.textContent = "⚠️ 弱信号：关注做空价差";
    icon.textContent = "⚠️";
    sub.textContent = `价差=+${spread.toFixed(0)}${unit}（${T.openHi}~${T.strongHi}区间），弱信号，可小仓关注`;
    opEl.style.color = "var(--orange)"; opEl.textContent = `可小仓：做空${legs[0]}、做多${legs[1]}`;
    tpEl.style.color = "var(--t3)"; tpEl.textContent = `差值回至 +${tpHi.toFixed(0)}${unit}以内`;
    slEl.style.color = "var(--red)"; slEl.textContent = `+${T.sl}${unit}以上`;
  } else if (spread <= T.openLo) {
    bar.className = "dc-signal-bar buy";
    badge.className = "dc-badge badge-buy"; badge.textContent = "⚠️ 弱信号：关注做多价差";
    icon.textContent = "⚠️";
    sub.textContent = `价差=${spread.toFixed(0)}${unit}（${T.openLo}~${T.strongLo}区间），弱信号`;
    opEl.style.color = "var(--green)"; opEl.textContent = `可小仓：做多${legs[0]}、做空${legs[1]}`;
    tpEl.style.color = "var(--t3)"; tpEl.textContent = `差值回至 ${tpLo.toFixed(0)}${unit}以上`;
    slEl.style.color = "var(--red)"; slEl.textContent = `${-T.sl}${unit}以下`;
  } else {
    bar.className = "dc-signal-bar wait";
    badge.className = "dc-badge badge-wait"; badge.textContent = "📊 观望";
    icon.textContent = "📊";
    sub.textContent = `价差=${spread >= 0 ? "+" : ""}${spread.toFixed(0)}${unit}，处于正常区间（${T.openLo}~+${T.openHi}${unit}），暂无开仓信号`;
    opEl.style.color = "var(--t3)"; opEl.textContent = "暂无操作，持续监控中";
    tpEl.textContent = "—"; slEl.textContent = "—";
  }

  document.getElementById("dc-date").textContent = d.last_date + (d.realtime ? " 实时" : " 昨日收盘");
  noteEl.textContent = (d.note || "") + ` · 价差均值${mean >= 0 ? "+" : ""}${mean.toFixed(0)}${unit} · ${d.realtime ? "🟢实时价" : "⚠昨日收盘价"} ${d.last_date} · 仅供研究参考`;
}

function renderPrices(d) {
  const legs = d.legs || [];
  const prices = d.leg_prices || {};
  const rtSyms = d.rt_syms || {};
  const spread = d.stats.cur;
  const unit = d.unit || "";

  let html = "";
  legs.forEach((sym, i) => {
    if (i > 0) html += `<div class="dc-price-div"></div>`;
    const price = prices[sym] || "—";
    const rtSym = rtSyms[sym] ? `(${rtSyms[sym]})` : "";
    html += `<div class="dc-price-item">
      <div class="dc-price-label">${sym}${rtSym} 主力</div>
      <div class="dc-price-val">${typeof price === "number" ? price.toLocaleString() : price}</div>
      <div class="dc-price-sub">${d.realtime ? "🟢 实时" : "昨收"}</div>
    </div>`;
  });

  // 价差
  html += `<div class="dc-price-div"></div>`;
  html += `<div class="dc-price-item" style="text-align:center">
    <div class="dc-price-label">价差（${unit}）</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:4px">
      <div class="dc-diff-val" style="color:var(--orange)">${spread >= 0 ? "+" : ""}${spread.toLocaleString()}</div>
    </div>
    <div class="dc-price-sub">均值${d.stats.mean >= 0 ? "+" : ""}${d.stats.mean.toFixed(0)}</div>
  </div>`;

  // 分位 + Z
  html += `<div class="dc-price-div"></div>`;
  html += `<div class="dc-price-item">
    <div class="dc-price-label">历史分位</div>
    <div class="dc-price-val" style="font-size:1.3rem;color:${d.stats.pct > 80 ? "var(--red)" : d.stats.pct < 20 ? "var(--green)" : "var(--t3)"}">${"P" + d.stats.pct.toFixed(1)}%</div>
    <div class="dc-price-sub">${yrs}年统计</div>
  </div>`;
  html += `<div class="dc-price-div"></div>`;
  html += `<div class="dc-price-item">
    <div class="dc-price-label">Z-Score</div>
    <div class="dc-price-val" style="font-size:1.3rem;color:${Math.abs(d.stats.z) >= 2 ? "var(--red)" : Math.abs(d.stats.z) >= 1.5 ? "var(--orange)" : "var(--t3)"}">${(d.stats.z >= 0 ? "+" : "") + d.stats.z.toFixed(2)}σ</div>
    <div class="dc-price-sub">${d.stats.z > 0 ? legs[0] + "偏贵" : legs[1] + "偏贵"}</div>
  </div>`;

  document.getElementById("dc-prices").innerHTML = html;
}

function renderCorr(d) {
  const corr = d.corr || {};
  const legs = d.legs || [];
  const ci = Object.entries(corr).map(([k, v]) => {
    const c = v > 0.6 ? "var(--t)" : "var(--t3)";
    return `<div class="crr-item"><span class="crr-k">${k}</span><span class="crr-v" style="color:${c}">${v.toFixed(3)}</span></div>`;
  }).join("");
  const label = legs.length >= 2 ? `${legs[0]}/${legs[1]}` : "各腿";
  document.getElementById("crr").innerHTML = `<span class="crr-label">📊 ${label} 相关性</span><div class="crr-items">${ci}</div>`;
}

function renderPctBar(d) {
  const wrap = document.getElementById("pct-bar-wrap");
  const dot = document.getElementById("pct-bar-dot");
  const val = document.getElementById("pct-bar-val");
  const yrsEl = document.getElementById("pct-bar-yrs");
  if (!wrap) return;
  wrap.style.display = "block";
  const pct = d.stats.pct;
  dot.style.left = Math.min(Math.max(pct, 1), 99).toFixed(1) + "%";
  val.textContent = "P" + pct.toFixed(1) + "%";
  val.style.color = pct > 80 ? "var(--red)" : pct < 20 ? "var(--green)" : "var(--t3)";
  if (yrsEl) yrsEl.textContent = yrs;
}

function renderFormula(d) {
  const formula = d.formula || "—";
  const prices = d.leg_prices || {};
  const legs = d.legs || [];
  const unit = d.unit || "";

  document.getElementById("formula-main").textContent = `公式: ${formula}`;
  document.getElementById("formula-note").textContent = d.note || "";

  // 实时代入
  let liveStr = formula;
  legs.forEach(sym => {
    const p = prices[sym];
    if (p != null) liveStr = liveStr.replace(new RegExp("\\b" + sym + "\\b", "g"), p.toFixed(1));
  });
  try {
    const val = eval(liveStr.replace(/[A-Z]+/g, "0")); // safe fallback, actual substitution done above
    document.getElementById("formula-live").textContent = `实时代入: ${liveStr} = ${d.stats.cur.toFixed(2)} ${unit}`;
  } catch(e) {
    document.getElementById("formula-live").textContent = `实时代入: ${liveStr} ≈ ${d.stats.cur.toFixed(2)} ${unit}`;
  }
}

function renderCharts(d) {
  const isMobile = window.innerWidth <= 500;
  const sp = d.spread;
  const bm = d.boll_mid;
  const bu = d.boll_up;
  const bl = d.boll_dn;
  const st = d.stats;
  const legs = d.legs || [];
  const unit = d.unit || "";
  const legsData = d.legs_data || {};

  document.getElementById("mct").textContent = `价差走势（${yrs}年）· 布林带`;

  if (!mc_c) mc_c = echarts.init(document.getElementById("mc"));
  mc_c.setOption({
    backgroundColor: "#fff",
    grid: {left: isMobile ? 52 : 65, right: isMobile ? 12 : 16, top: isMobile ? 80 : 72, bottom: 30},
    tooltip: {trigger: "axis", axisPointer: {type: "cross"}, backgroundColor: "#fff", borderColor: "#dde1e7", textStyle: {color: "#1a1d23", fontSize: 11}},
    legend: {top: 4, left: "center", orient: "horizontal", textStyle: {color: "#4a5568", fontSize: isMobile ? 9 : 10}, itemWidth: 12, itemHeight: 7, itemGap: isMobile ? 5 : 10},
    xAxis: {type: "category", data: d.dates, boundaryGap: false, axisLine: {lineStyle: {color: "#dde1e7"}},
      axisLabel: {color: "#8a93a2", fontSize: 9, interval: Math.floor(d.dates.length / (isMobile ? 4 : 6)), formatter: v => v ? v.slice(0, 7) : ""},
      splitLine: {show: false}},
    yAxis: {type: "value", scale: true, axisLine: {lineStyle: {color: "#dde1e7"}},
      axisLabel: {color: "#8a93a2", fontSize: isMobile ? 9 : 10, formatter: v => v >= 1000 || v <= -1000 ? (v / 1000).toFixed(1) + "k" : v},
      splitLine: {lineStyle: {color: "#f0f2f5", type: "dashed"}}},
    dataZoom: [{type: "inside", start: 0, end: 100}],
    series: [
      {name: "价差", type: "line", data: sp, color: "#ea580c", lineStyle: {color: "#ea580c", width: 2}, symbol: "none", z: 10},
      {name: "布林上", type: "line", data: bu, color: "#dc2626", lineStyle: {color: "#dc2626", width: 1, type: "dashed"}, symbol: "none", z: 5},
      {name: "布林中", type: "line", data: bm, color: "#ca8a04", lineStyle: {color: "#ca8a04", width: 1, type: "dashed"}, symbol: "none", z: 5},
      {name: "布林下", type: "line", data: bl, color: "#16a34a", lineStyle: {color: "#16a34a", width: 1, type: "dashed"}, symbol: "none", z: 5},
      {name: "均值", type: "line", data: new Array(d.dates.length).fill(st.mean), color: "rgba(107,114,128,.5)", lineStyle: {color: "rgba(107,114,128,.5)", width: 1.5, type: "dotted"}, symbol: "none"},
      {name: "P95", type: "line", data: new Array(d.dates.length).fill(st.p95), color: "rgba(220,38,38,.35)", lineStyle: {color: "rgba(220,38,38,.35)", width: 1, type: "dotted"}, symbol: "none"},
      {name: "P5",  type: "line", data: new Array(d.dates.length).fill(st.p5),  color: "rgba(22,163,74,.35)",  lineStyle: {color: "rgba(22,163,74,.35)", width: 1, type: "dotted"}, symbol: "none"},
    ]
  }, true);

  // 各腿价格走势
  const COLORS = ["#ea580c", "#9333ea", "#2563eb", "#16a34a", "#ca8a04"];
  const legSeries = legs.map((sym, i) => ({
    name: sym,
    type: "line",
    data: legsData[sym] || [],
    color: COLORS[i % COLORS.length],
    lineStyle: {width: 1.5},
    symbol: "none",
  }));
  document.getElementById("pct-title").textContent = legs.length > 2 ? "各腿价格走势" : `${legs.join(" / ")} 价格走势`;
  if (!pc_c) pc_c = echarts.init(document.getElementById("pc"));
  pc_c.setOption({
    backgroundColor: "#fff",
    grid: {left: isMobile ? 52 : 65, right: 16, top: 30, bottom: 28},
    tooltip: {trigger: "axis", backgroundColor: "#fff", borderColor: "#dde1e7", textStyle: {color: "#1a1d23", fontSize: 11}},
    legend: {top: 4, left: "center", textStyle: {color: "#4a5568", fontSize: 9}, itemWidth: 12, itemHeight: 7, itemGap: 12},
    xAxis: {type: "category", data: d.dates, boundaryGap: false,
      axisLabel: {color: "#8a93a2", fontSize: 9, interval: Math.floor(d.dates.length / (isMobile ? 4 : 6)), formatter: v => v ? v.slice(0, 7) : ""},
      axisLine: {lineStyle: {color: "#dde1e7"}}, splitLine: {show: false}},
    dataZoom: [{type: "inside", start: 0, end: 100}],
    yAxis: {type: "value", scale: true,
      axisLabel: {color: "#8a93a2", fontSize: 9, formatter: v => v >= 1000 ? (v / 1000).toFixed(1) + "k" : v},
      splitLine: {lineStyle: {color: "#f0f2f5", type: "dashed"}}},
    series: legSeries
  }, true);

  // 分布直方图
  const vld = sp.filter(v => v != null);
  const mn = Math.min(...vld), mx = Math.max(...vld), B = 50, bw = (mx - mn) / B;
  const hs = new Array(B).fill(0), lb2 = [];
  for (let i = 0; i < B; i++) lb2.push((mn + i * bw).toFixed(0));
  vld.forEach(x => { let i = Math.min(Math.floor((x - mn) / bw), B - 1); hs[i]++; });
  const cb = Math.min(Math.floor((st.cur - mn) / bw), B - 1);
  const cs = hs.map((_, i) => i === cb ? "#dc2626" : "rgba(234,88,12,.45)");
  if (!hc_c) hc_c = echarts.init(document.getElementById("hc"));
  hc_c.setOption({
    backgroundColor: "#fff",
    grid: {left: 38, right: 16, top: 14, bottom: 30},
    tooltip: {trigger: "axis", backgroundColor: "#fff", borderColor: "#dde1e7", textStyle: {color: "#1a1d23", fontSize: 11}},
    xAxis: {type: "category", data: lb2, axisLabel: {color: "#8a93a2", fontSize: 9, interval: Math.floor(B / 7)}, axisLine: {lineStyle: {color: "#dde1e7"}}, splitLine: {show: false}},
    yAxis: {type: "value", axisLabel: {color: "#8a93a2", fontSize: 9}, splitLine: {lineStyle: {color: "#f0f2f5", type: "dashed"}}},
    series: [{type: "bar", data: hs, itemStyle: {color: params => cs[params.dataIndex]}, barWidth: "96%"}]
  }, true);
}

function renderStats(d) {
  const st = d.stats;
  const unit = d.unit || "";
  const legs = d.legs || [];

  const rets = d.spread.filter(v => v != null);
  const av = rets.length > 2 ? (() => {
    const r = rets.slice(1).map((x, i) => (x - rets[i]) / Math.abs(rets[i] || 1));
    const rm = r.reduce((a, b) => a + b, 0) / r.length;
    return (Math.sqrt(r.reduce((a, b) => a + (b - rm) ** 2, 0) / r.length) * Math.sqrt(252) * 100).toFixed(1);
  })() : "—";

  document.getElementById("stats-row").innerHTML = `
    <div class="sbx"><h4>📊 价差分布（${yrs}年统计）</h4>
      ${[
        ["P5（历史低位）", st.p5.toFixed(0) + unit],
        ["均值", (st.mean >= 0 ? "+" : "") + st.mean.toFixed(0) + unit],
        ["P95（历史高位）", (st.p95 >= 0 ? "+" : "") + st.p95.toFixed(0) + unit],
        ["1σ标准差", st.std.toFixed(0) + unit],
        ["当前分位", "P" + st.pct.toFixed(1) + "%"],
        ["当前价差", (st.cur >= 0 ? "+" : "") + st.cur.toFixed(0) + unit],
      ].map(([k, v]) => `<div class="sr"><span class="sk">${k}</span><span class="sv">${v}</span></div>`).join("")}
    </div>
    <div class="sbx"><h4>📈 年化波动率</h4>
      <div class="sr"><span class="sk">年化波动率</span><span class="sv">${av}%</span></div>
      <div class="sr"><span class="sk">Z-Score</span><span class="sv">${(st.z >= 0 ? "+" : "") + st.z.toFixed(3)}σ</span></div>
      <div class="note-tip">波动率越高代表价差近期波动幅度越大，建议相应调整仓位。</div>
    </div>`;
}

// ===== 工具函数 =====
function showOv(t, isErr) {
  const ov = document.getElementById("ov");
  const ovt = document.getElementById("ovt");
  ov.classList.remove("hide");
  ovt.textContent = t;
  if (isErr) {
    ov.style.background = "rgba(255,245,245,.96)";
    ovt.style.color = "var(--red)";
    setTimeout(() => hideOv(), 4000);
  } else {
    ov.style.background = "rgba(255,255,255,.92)";
    ovt.style.color = "var(--t2)";
  }
}
function hideOv() { document.getElementById("ov").classList.add("hide"); }

async function fetchWithTimeout(url, timeoutMs = 65000) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const r = await fetch(url, {signal: ctrl.signal});
    clearTimeout(tid);
    return r;
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
}

function toggleEl(bodyId, arrowId) {
  const b = document.getElementById(bodyId), a = document.getElementById(arrowId);
  b.classList.toggle("open"); a.textContent = b.classList.contains("open") ? "▲" : "▼";
}

window.addEventListener("resize", () => {
  mc_c && mc_c.resize();
  pc_c && pc_c.resize();
  hc_c && hc_c.resize();
  if (D) renderCharts(D);
});

// ===== 初始化 =====
renderMenu();
selectStrategy("br_nr").then(() => {
  loadAllBadges();
});
