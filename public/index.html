<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>期货套利分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bd:#30363d;--t:#c9d1d9;--t2:#8b949e;--t3:#6e7681;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#ce93d8}
body{background:var(--bg);color:var(--t);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:1.1rem;color:var(--blue);display:flex;align-items:center;gap:6px}
.tags{display:flex;gap:4px;margin-left:10px}
.tag{padding:2px 7px;border-radius:10px;font-size:.68rem;font-weight:600}
.tg{background:#3d2b00;color:#ffd700;border:1px solid #5a3e00}
.tb{background:#0c2d48;color:var(--blue);border:1px solid #1f6feb}
.tn{background:#0c2d1a;color:var(--green);border:1px solid #196c2e}
.hdr-r{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--t3)}
#lupd{color:var(--t2)}
.rbtn{padding:4px 11px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--t2);cursor:pointer;font-size:.72rem;transition:all .15s}
.rbtn:hover{border-color:var(--blue);color:var(--blue)}
.layout{display:flex;height:calc(100vh - 50px)}
.sb{width:205px;min-width:205px;background:var(--bg2);border-right:1px solid var(--bd);overflow-y:auto;flex-shrink:0}
.sb-ttl{padding:7px 13px;font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.pi{padding:7px 13px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.pi:hover{background:var(--bg3)}
.pi.act{background:#1f2937;border-left-color:var(--blue)}
.pi-nm{font-size:.85rem;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.pi-nt{font-size:.68rem;color:var(--t3);margin-top:1px}
.zb{font-size:.7rem;padding:1px 5px;border-radius:7px;font-weight:600}
.zh{background:#3d1a1a;color:var(--red)}
.zm{background:#3d2b00;color:var(--yellow)}
.zl{background:#0c2d1a;color:var(--green)}
.sb-div{height:1px;background:var(--bd);margin:4px 13px}
.csel{padding:7px 13px}
.csel label{font-size:.67rem;color:var(--t3);display:block;margin-bottom:3px}
.csel select{width:100%;background:var(--bg3);border:1px solid var(--bd);color:var(--t);padding:4px 7px;border-radius:4px;font-size:.75rem;cursor:pointer}
.csel select:focus{outline:none;border-color:var(--blue)}
.abtn{width:100%;margin-top:7px;padding:5px;background:var(--blue);border:none;border-radius:4px;color:#fff;font-size:.75rem;cursor:pointer;font-weight:600}
.abtn:hover{background:#1f6feb}
.ct{flex:1;overflow-y:auto;padding:12px 16px}
.mcs{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:7px;margin-bottom:10px}
.mc{background:var(--bg2);border:1px solid var(--bd);border-radius:7px;padding:9px 11px}
.ml{font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.mv{font-size:1.2rem;font-weight:700}
.md{font-size:.68rem;margin-top:1px}
.up{color:var(--green)}.dn{color:var(--red)}.fl{color:var(--t3)}
.crr{background:var(--bg2);border:1px solid #196c2e;border-radius:6px;padding:7px 13px;margin-bottom:9px;display:flex;align-items:center;flex-wrap:wrap;gap:9px}
.crr-t{font-size:.72rem;color:var(--green);font-weight:700;white-space:nowrap}
.crr-is{display:flex;gap:11px;flex-wrap:wrap}
.crr-i{font-size:.78rem;display:flex;align-items:center;gap:4px}
.crr-k{color:var(--t3)}.crr-v{font-weight:700}
.cseg{width:44px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.cseg-f{height:100%;border-radius:2px}
.sig{border-radius:6px;padding:7px 13px;margin-bottom:9px;font-size:.8rem;border-left:4px solid;line-height:1.5}
.sok{background:#0a1a0f;border-color:var(--green);color:#7ee787}
.swn{background:#1a150a;border-color:var(--yellow);color:#e3b341}
.sdn{background:#1a0d0d;border-color:var(--red);color:#ffa198}
.mr{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.mbtn{padding:4px 12px;border-radius:5px;border:1px solid var(--bd);background:var(--bg3);color:var(--t2);cursor:pointer;font-size:.75rem;transition:all .15s}
.mbtn.act{background:#1f6feb;border-color:#1f6feb;color:#fff}
.ysel{margin-left:auto;background:var(--bg3);border:1px solid var(--bd);color:var(--t2);padding:3px 7px;border-radius:5px;font-size:.72rem;cursor:pointer}
.ysel:focus{outline:none;border-color:var(--blue)}
.cbx{background:var(--bg2);border:1px solid var(--bd);border-radius:7px;padding:9px 11px;margin-bottom:9px}
.cbx-hdr{font-size:.75rem;color:var(--t2);margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--bd)}
#mc{width:100%;height:360px}#pc{width:100%;height:185px}#hc{width:100%;height:165px}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:9px}
.sbx{background:var(--bg2);border:1px solid var(--bd);border-radius:7px;padding:9px 11px}
.sbx h4{font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px;font-weight:700}
.sr{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--bd);font-size:.75rem}
.sr:last-child{border:none}
.sk{color:var(--t3)}.sv{color:var(--t);font-weight:500}
.ov{position:fixed;inset:0;background:rgba(13,17,23,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:11px}
.sp{width:34px;height:34px;border:3px solid var(--bd);border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-t{color:var(--t2);font-size:.87rem}
.ov.hide{display:none}
.ft{text-align:center;padding:9px;font-size:.68rem;color:var(--t3);border-top:1px solid var(--bd)}
@media(max-width:768px){.layout{flex-direction:column}.sb{width:100%;min-width:unset;height:auto;max-height:200px;border-right:none;border-bottom:1px solid var(--bd)}.sg{grid-template-columns:1fr}.mcs{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="ov" id="ov"><div class="sp"></div><div class="ov-t" id="ovt">正在拉取最新行情数据...</div></div>
<div class="hdr">
  <div style="display:flex;align-items:center">
    <h1>📊 期货套利分析</h1>
    <div class="tags"><span class="tag tg">金牛</span><span class="tag tb">套利</span><span class="tag tn">中风险</span></div>
  </div>
  <div class="hdr-r">数据更新：<span id="lupd">—</span><button class="rbtn" onclick="refreshData()">🔄 刷新</button></div>
</div>
<div class="layout">
  <div class="sb">
    <div class="sb-ttl">推荐套利对</div>
    <div id="pairList"></div>
    <div class="sb-div"></div>
    <div class="sb-ttl">自定义选品</div>
    <div class="csel">
      <label>品种 A（分子）</label><select id="selA"></select>
      <label style="margin-top:7px">品种 B（分母）</label><select id="selB"></select>
      <button class="abtn" onclick="applyCustom()">✓ 应用</button>
    </div>
  </div>
  <div class="ct">
    <div id="mcs" class="mcs"></div>
    <div id="crr" class="crr"></div>
    <div id="sig" class="sig sok"></div>
    <div class="mr">
      <button class="mbtn act" id="br" onclick="setMode('ratio')">比值 A/B</button>
      <button class="mbtn" id="bd" onclick="setMode('diff')">价差 A-B</button>
      <select class="ysel" id="ys" onchange="onYears()">
        <option value="1">1年</option><option value="2">2年</option>
        <option value="3" selected>3年</option><option value="5">5年</option>
      </select>
    </div>
    <div class="cbx"><div class="cbx-hdr" id="mct"></div><div id="mc"></div></div>
    <div class="cbx"><div class="cbx-hdr" id="pct"></div><div id="pc"></div></div>
    <div class="sg" id="sg"></div>
    <div class="cbx"><div class="cbx-hdr">分布直方图</div><div id="hc"></div></div>
    <div class="ft">数据来源：新浪财经期货主力连续合约 &nbsp;|&nbsp; 仅供研究参考，不构成投资建议</div>
  </div>
</div>
<script>
const API = window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1'
  ? `http://${window.location.host}` : window.location.origin;

const SYMS=["BR","RU","NR","BU","FU","SC","L","PP","EB","PG","V","MA","TA","EG","CU","AL","ZN","AU","AG","I","J","JM","M","Y","P","OI","C","CF","SR","RM"];
const SN={BR:"合成橡胶",RU:"天然橡胶",NR:"20号胶",BU:"沥青",FU:"燃料油",SC:"原油",L:"聚乙烯",PP:"聚丙烯",EB:"苯乙烯",PG:"液化气",V:"PVC",MA:"甲醇",TA:"PTA",EG:"乙二醇",CU:"铜",AL:"铝",ZN:"锌",AU:"黄金",AG:"白银",I:"铁矿石",J:"焦炭",JM:"焦煤",M:"豆粕",Y:"豆油",P:"棕榈油",OI:"菜油",C:"玉米",CF:"棉花",SR:"白糖",RM:"菜粕"};

let cA="BR",cB="NR",mode="ratio",yrs=3,D=null,rPairs=[];
let mc,pc,hc;

function showOv(t){document.getElementById("ov").classList.remove("hide");document.getElementById("ovt").textContent=t}
function hideOv(){document.getElementById("ov").classList.add("hide")}

async function init(){
  const sa=document.getElementById("selA"),sb2=document.getElementById("selB");
  SYMS.forEach(s=>{const o=`<option value="${s}">${s} - ${SN[s]||s}</option>`;sa.insertAdjacentHTML("beforeend",o);sb2.insertAdjacentHTML("beforeend",o)});
  sa.value=cA;sb2.value=cB;
  try{const r=await fetch(`${API}/api/symbols`);const j=await r.json();rPairs=j.recommended_pairs||[]}catch(e){rPairs=[]}
  buildSB();
  await loadPair(cA,cB);
}

function buildSB(bd){
  const el=document.getElementById("pairList");el.innerHTML="";
  rPairs.forEach(p=>{
    const bx=bd?bd.find(x=>x.a===p.a&&x.b===p.b):null;
    const z=bx?bx.ratio_z:null;
    let zb="";
    if(z!==null&&z!==undefined){const c=Math.abs(z)>2?"zh":Math.abs(z)>1?"zm":"zl";zb=`<span class="zb ${c}">Z${z>=0?"+":""}${z.toFixed(2)}</span>`}
    const isA=p.a===cA&&p.b===cB;
    const div=document.createElement("div");
    div.className="pi"+(isA?" act":"");
    div.innerHTML=`<div class="pi-nm"><span>${p.a}/${p.b}</span>${zb}</div><div class="pi-nt">${SN[p.a]||p.a} / ${SN[p.b]||p.b} · ${p.note}</div>`;
    div.onclick=()=>{cA=p.a;cB=p.b;document.getElementById("selA").value=cA;document.getElementById("selB").value=cB;document.querySelectorAll(".pi").forEach(x=>x.classList.remove("act"));div.classList.add("act");loadPair(cA,cB)};
    el.appendChild(div);
  });
}

async function loadPair(a,b){
  showOv(`正在拉取 ${a}/${b} 行情数据（约5~15秒）...`);
  try{
    const r=await fetch(`${API}/api/pair?a=${a}&b=${b}&years=${yrs}`);
    if(!r.ok)throw new Error(await r.text());
    D=await r.json();
    if(D.error)throw new Error(D.error);
    render();
    document.getElementById("lupd").textContent=new Date().toLocaleTimeString("zh-CN");
    fetchBatch();
  }catch(e){alert("加载失败："+e.message)}
  finally{hideOv()}
}

async function fetchBatch(){
  try{const r=await fetch(`${API}/api/batch?years=${yrs}`);const b=await r.json();buildSB(b)}catch(e){}
}

function refreshData(){loadPair(cA,cB)}
function applyCustom(){const a=document.getElementById("selA").value,b=document.getElementById("selB").value;if(a===b){alert("品种不能相同");return}cA=a;cB=b;document.querySelectorAll(".pi").forEach(x=>x.classList.remove("act"));loadPair(a,b)}
function setMode(m){mode=m;document.getElementById("br").className="mbtn"+(m==="ratio"?" act":"");document.getElementById("bd").className="mbtn"+(m==="diff"?" act":"");if(D)render()}
function onYears(){yrs=parseInt(document.getElementById("ys").value);loadPair(cA,cB)}

function render(){
  const d=D,ir=mode==="ratio";
  const sp=ir?d.ratio:d.diff,st=ir?d.ratio_stats:d.diff_stats;
  const bm=ir?d.boll_mid_r:d.boll_mid_d,bu=ir?d.boll_up_r:d.boll_up_d,bl=ir?d.boll_dn_r:d.boll_dn_d;
  const lb=ir?`${d.sym_a}/${d.sym_b} 比值`:`${d.sym_a}-${d.sym_b} 价差`;
  const dp=ir?4:2;

  // metrics
  const vld=sp.filter(x=>x!==null);const prev=vld[vld.length-2]??st.cur;const dlt=st.cur-prev;
  const ds=(dlt>=0?"+":"")+dlt.toFixed(dp),dc=dlt>0?"up":dlt<0?"dn":"fl";
  document.getElementById("mcs").innerHTML=`
    <div class="mc"><div class="ml">当前${ir?"比率":"价差"}</div><div class="mv">${st.cur.toFixed(dp)}</div><div class="md ${dc}">${ds}</div></div>
    <div class="mc"><div class="ml">均值</div><div class="mv">${st.mean.toFixed(dp)}</div></div>
    <div class="mc"><div class="ml">标准差</div><div class="mv">${st.std.toFixed(dp)}</div></div>
    <div class="mc"><div class="ml">当前分位</div><div class="mv">P${st.pct.toFixed(1)}</div></div>
    <div class="mc"><div class="ml">${d.sym_a}(${SN[d.sym_a]||""}) 最新</div><div class="mv">${d.ca_last}</div></div>
    <div class="mc"><div class="ml">${d.sym_b}(${SN[d.sym_b]||""}) 最新</div><div class="mv">${d.cb_last}</div></div>`;

  // corr
  const ci=Object.entries(d.corr).map(([k,v])=>{const c=v>0.6?"var(--green)":v>0.3?"var(--yellow)":"var(--red)";return`<div class="crr-i"><span class="crr-k">${k}</span><span class="crr-v" style="color:${c}">${v.toFixed(2)}</span><div class="cseg"><div class="cseg-f" style="width:${Math.abs(v)*100}%;background:${c}"></div></div></div>`}).join("");
  document.getElementById("crr").innerHTML=`<span class="crr-t">📊 相关性</span><div class="crr-is">${ci}</div>`;

  // signal
  const az=Math.abs(st.z);let sc="sok",st2="";
  if(az>2){sc="sdn";st2=`⚠️ ${lb} Z-Score=${st.z.toFixed(2)}，显著${st.z>0?"偏高":"偏低"}（超过±2σ），存在均值回归机会`}
  else if(az>1){sc="swn";st2=`📍 ${lb} Z-Score=${st.z.toFixed(2)}，${st.z>0?"略高":"略低"}（±1~2σ），可关注`}
  else{st2=`✅ ${lb} Z-Score=${st.z.toFixed(2)}，处于正常波动范围（±1σ）`}
  const se=document.getElementById("sig");se.className=`sig ${sc}`;se.textContent=st2;

  document.getElementById("mct").textContent=`${lb} 走势（${yrs}年）· 布林带 · P5/均值/P95`;
  document.getElementById("pct").textContent=`${d.sym_a}(${SN[d.sym_a]||""}) / ${d.sym_b}(${SN[d.sym_b]||""}) 价格走势`;

  // main chart
  if(!mc)mc=echarts.init(document.getElementById("mc"),"dark");
  mc.setOption({backgroundColor:"#161b22",grid:{left:56,right:105,top:34,bottom:34},
    tooltip:{trigger:"axis",axisPointer:{type:"cross"},backgroundColor:"#21262d",borderColor:"#30363d",textStyle:{color:"#c9d1d9",fontSize:11}},
    legend:{top:5,right:5,textStyle:{color:"#8b949e",fontSize:10},itemWidth:14,itemHeight:8},
    xAxis:{type:"category",data:d.dates,boundaryGap:false,axisLine:{lineStyle:{color:"#30363d"}},axisLabel:{color:"#6e7681",fontSize:10,interval:Math.floor(d.dates.length/7)},splitLine:{show:false}},
    yAxis:{type:"value",scale:true,axisLine:{lineStyle:{color:"#30363d"}},axisLabel:{color:"#6e7681",fontSize:10},splitLine:{lineStyle:{color:"#21262d",type:"dashed"}}},
    series:[
      {name:lb,type:"line",data:sp,lineStyle:{color:"#4fc3f7",width:1.8},symbol:"none",z:10},
      {name:"布林上",type:"line",data:bu,lineStyle:{color:"#f85149",width:1,type:"dashed"},symbol:"none",z:5},
      {name:"布林中",type:"line",data:bm,lineStyle:{color:"#ffd740",width:1,type:"dashed"},symbol:"none",z:5},
      {name:"布林下",type:"line",data:bl,lineStyle:{color:"#3fb950",width:1,type:"dashed"},symbol:"none",z:5,areaStyle:{color:{type:"linear",x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:"rgba(63,185,80,.07)"},{offset:1,color:"rgba(63,185,80,0)"}]}}},
      {name:"P95",type:"line",data:new Array(d.dates.length).fill(st.p95),lineStyle:{color:"rgba(248,81,73,.4)",width:1,type:"dotted"},symbol:"none",z:3},
      {name:"均值线",type:"line",data:new Array(d.dates.length).fill(st.mean),lineStyle:{color:"rgba(255,215,64,.5)",width:1,type:"dotted"},symbol:"none",z:3},
      {name:"P5",type:"line",data:new Array(d.dates.length).fill(st.p5),lineStyle:{color:"rgba(63,185,80,.4)",width:1,type:"dotted"},symbol:"none",z:3},
    ]},true);

  // price chart
  if(!pc)pc=echarts.init(document.getElementById("pc"),"dark");
  pc.setOption({backgroundColor:"#161b22",grid:{left:56,right:70,top:24,bottom:30},
    tooltip:{trigger:"axis",backgroundColor:"#21262d",borderColor:"#30363d",textStyle:{color:"#c9d1d9",fontSize:11}},
    legend:{top:3,right:5,textStyle:{color:"#8b949e",fontSize:9},itemWidth:12,itemHeight:7},
    xAxis:{type:"category",data:d.dates,boundaryGap:false,axisLabel:{color:"#6e7681",fontSize:9,interval:Math.floor(d.dates.length/6)},axisLine:{lineStyle:{color:"#30363d"}},splitLine:{show:false}},
    yAxis:[{type:"value",scale:true,name:d.sym_a,nameTextStyle:{color:"#4fc3f7",fontSize:9},axisLabel:{color:"#4fc3f7",fontSize:9},splitLine:{lineStyle:{color:"#21262d",type:"dashed"}}},{type:"value",scale:true,name:d.sym_b,nameTextStyle:{color:"#ce93d8",fontSize:9},axisLabel:{color:"#ce93d8",fontSize:9},splitLine:{show:false}}],
    series:[{name:d.sym_a,type:"line",data:d.ca,yAxisIndex:0,lineStyle:{color:"#4fc3f7",width:1.2},symbol:"none"},{name:d.sym_b,type:"line",data:d.cb,yAxisIndex:1,lineStyle:{color:"#ce93d8",width:1.2},symbol:"none"}]},true);

  // hist
  const v2=sp.filter(x=>x!==null);const mn=Math.min(...v2),mx=Math.max(...v2),B=50,bw=(mx-mn)/B;
  const hs=new Array(B).fill(0),lb2=[];
  for(let i=0;i<B;i++)lb2.push((mn+i*bw).toFixed(dp));
  v2.forEach(x=>{let i=Math.floor((x-mn)/bw);if(i>=B)i=B-1;hs[i]++});
  const cb=Math.min(Math.floor((st.cur-mn)/bw),B-1);
  const cs=hs.map((_,i)=>i===cb?"#ff4081":"rgba(79,195,247,.65)");
  if(!hc)hc=echarts.init(document.getElementById("hc"),"dark");
  hc.setOption({backgroundColor:"#161b22",grid:{left:38,right:16,top:16,bottom:32},
    tooltip:{trigger:"axis",backgroundColor:"#21262d",borderColor:"#30363d",textStyle:{color:"#c9d1d9",fontSize:11}},
    xAxis:{type:"category",data:lb2,axisLabel:{color:"#6e7681",fontSize:9,interval:Math.floor(B/7)},axisLine:{lineStyle:{color:"#30363d"}},splitLine:{show:false}},
    yAxis:{type:"value",axisLabel:{color:"#6e7681",fontSize:9},splitLine:{lineStyle:{color:"#21262d",type:"dashed"}}},
    series:[{type:"bar",data:hs,itemStyle:{color:params=>cs[params.dataIndex]},barWidth:"96%"}]},true);

  // stats
  const rets=v2.slice(1).map((x,i)=>(x-v2[i])/v2[i]);
  const rm=rets.reduce((a,b)=>a+b,0)/rets.length;
  const av=(Math.sqrt(rets.reduce((a,b)=>a+(b-rm)**2,0)/rets.length)*Math.sqrt(252)*100).toFixed(2);
  document.getElementById("sg").innerHTML=`
    <div class="sbx"><h4>分位分布</h4>
      ${[["P5",st.p5.toFixed(dp)],["P25",((st.p5*3+st.mean)/4).toFixed(dp)],["P50(中位)",st.mean.toFixed(dp)],["P75",((st.mean*3+st.p95)/4).toFixed(dp)],["P95",st.p95.toFixed(dp)],["当前分位","P"+st.pct.toFixed(1)]].map(([k,v])=>`<div class="sr"><span class="sk">${k}</span><span class="sv">${v}</span></div>`).join("")}
    </div>
    <div class="sbx"><h4>各周期相关性</h4>
      ${Object.entries(d.corr).map(([k,v])=>`<div class="sr"><span class="sk">${k}</span><span class="sv" style="color:${v>0.6?"var(--green)":v>0.3?"var(--yellow)":"var(--red)"}">${v.toFixed(4)}</span></div>`).join("")}
    </div>
    <div class="sbx"><h4>波动率 & 统计</h4>
      ${[["年化波动率",av+"%"],["Z-Score",st.z.toFixed(3)],["样本数",v2.length],["历史年份",yrs+"年"],["最新日期",d.last_date]].map(([k,v])=>`<div class="sr"><span class="sk">${k}</span><span class="sv">${v}</span></div>`).join("")}
    </div>`;
}

window.addEventListener("resize",()=>{mc&&mc.resize();pc&&pc.resize();hc&&hc.resize()});
init();
</script>
</body>
</html>
