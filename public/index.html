<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>套利监控</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg:        #f0f2f5;
      --sidebar:   #ffffff;
      --card:      #ffffff;
      --border:    #e8ecf2;
      --text:      #1a2033;
      --sub:       #6b7a94;
      --muted:     #b0bac9;
      --accent:    #3b6cf4;
      --c-sell:    #d32f2f;
      --c-sell-bg: #fef2f2;
      --c-sell-bd: #fca5a5;
      --c-buy:     #1a7f4b;
      --c-buy-bg:  #f0fdf4;
      --c-buy-bd:  #86efac;
      --c-warn:    #b45309;
      --radius:    10px;
      --shadow:    0 1px 4px rgba(0,0,0,.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
           background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── 顶部导航栏 ── */
    .topbar {
      height: 52px; background: var(--sidebar); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .topbar-logo { font-size: 16px; font-weight: 700; color: var(--accent); }
    .topbar-sub  { font-size: 12px; color: var(--muted); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .topbar-time  { font-size: 12px; color: var(--muted); }
    .btn-refresh {
      padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px;
      background: #fff; color: var(--sub); font-size: 12px; cursor: pointer;
      transition: all .15s;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 主体区域 ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── 左侧菜单 ── */
    .sidebar {
      width: 220px; flex-shrink: 0; background: var(--sidebar);
      border-right: 1px solid var(--border); overflow-y: auto;
      display: flex; flex-direction: column;
    }

    .menu-group { padding: 8px 0; }
    .menu-group-title {
      padding: 10px 16px 4px;
      font-size: 11px; font-weight: 600; color: var(--muted);
      letter-spacing: .06em; text-transform: uppercase;
    }
    .menu-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 16px; cursor: pointer; font-size: 13px; color: var(--sub);
      border-left: 3px solid transparent; transition: all .12s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .menu-item:hover { background: #f5f7fb; color: var(--text); }
    .menu-item.active {
      background: #eef2ff; color: var(--accent);
      border-left-color: var(--accent); font-weight: 600;
    }
    .menu-item .badge {
      margin-left: auto; flex-shrink: 0;
      font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px;
    }
    .badge-sell { background: var(--c-sell-bg); color: var(--c-sell); }
    .badge-buy  { background: var(--c-buy-bg);  color: var(--c-buy); }
    .badge-neu  { background: #f1f5f9; color: var(--muted); }
    .badge-load { background: #eef2ff; color: var(--accent); }

    /* ── 右侧内容区 ── */
    .content { flex: 1; overflow-y: auto; padding: 24px; }

    /* ── 详情页 ── */
    .detail-header { margin-bottom: 20px; }
    .detail-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .detail-formula {
      font-size: 12px; color: var(--muted);
      font-family: "SFMono-Regular", Consolas, monospace;
    }

    /* 核心指标行 */
    .metrics-row {
      display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .metric-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 18px;
      box-shadow: var(--shadow); flex: 1; min-width: 120px;
    }
    .metric-card-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .metric-card-value { font-size: 26px; font-weight: 700; line-height: 1; }
    .metric-card-unit  { font-size: 11px; color: var(--sub); margin-top: 4px; }
    .val-sell { color: var(--c-sell); }
    .val-buy  { color: var(--c-buy); }
    .val-neu  { color: var(--text); }
    .val-warn { color: var(--c-warn); }

    /* 操作信号区 */
    .signal-box {
      border-radius: var(--radius); padding: 14px 18px;
      margin-bottom: 16px; border: 1.5px solid;
      display: flex; align-items: center; gap: 14px;
    }
    .signal-box.sell { background: var(--c-sell-bg); border-color: var(--c-sell-bd); }
    .signal-box.buy  { background: var(--c-buy-bg);  border-color: var(--c-buy-bd); }
    .signal-box.neu  { background: #f8fafc; border-color: var(--border); }
    .signal-icon { font-size: 28px; flex-shrink: 0; }
    .signal-text {}
    .signal-action { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .signal-desc   { font-size: 12px; color: var(--sub); line-height: 1.6; }

    /* 分位进度条 */
    .pbar-wrap { margin-bottom: 16px; }
    .pbar-header { display: flex; justify-content: space-between; align-items: center;
                   font-size: 12px; margin-bottom: 6px; }
    .pbar-label { color: var(--sub); }
    .pbar-val   { font-weight: 700; }
    .pbar-track { height: 8px; background: var(--border); border-radius: 4px;
                  position: relative; overflow: visible; }
    .pbar-fill  { height: 100%; border-radius: 4px;
                  background: linear-gradient(90deg, var(--c-buy) 0%, #facc15 50%, var(--c-sell) 100%); }
    .pbar-dot   { position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%;
                  background: #fff; border: 2px solid var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.2);
                  transform: translate(-50%, -50%); transition: left .4s; }

    /* 图表 */
    .chart-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 16px;
    }
    .chart-card-header {
      padding: 12px 16px 0; display: flex; justify-content: space-between; align-items: center;
    }
    .chart-card-title { font-size: 13px; font-weight: 600; color: var(--sub); }
    .chart-years { display: flex; gap: 4px; }
    .year-btn {
      padding: 3px 8px; border: 1px solid var(--border); border-radius: 4px;
      font-size: 11px; background: #fff; color: var(--sub); cursor: pointer;
    }
    .year-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .chart-body { height: 260px; padding: 4px 8px 8px; }

    /* 统计表 */
    .stats-table {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      margin-bottom: 16px; overflow: hidden;
    }
    .stats-table table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .stats-table th {
      padding: 10px 14px; text-align: left;
      background: #f8fafc; color: var(--muted); font-size: 11px; font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .stats-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .stats-table tr:last-child td { border-bottom: none; }

    /* 策略说明 */
    .desc-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      font-size: 13px; color: var(--sub); line-height: 1.8; box-shadow: var(--shadow);
    }

    /* 空状态 */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 60vh; color: var(--muted); gap: 12px; font-size: 14px;
    }
    .empty-state svg { opacity: .3; }

    /* ── 跨期价差专用 ── */
    .spread-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .spread-table th { padding: 8px 12px; background: #f8fafc; color: var(--muted);
                       font-size: 11px; font-weight: 600; border-bottom: 1px solid var(--border); text-align: left; }
    .spread-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .spread-table tr:last-child td { border-bottom: none; }

    /* ── 响应式：手机折叠侧栏 ── */
    @media (max-width: 700px) {
      .sidebar { width: 64px; }
      .menu-group-title, .menu-item span, .menu-item .badge { display: none; }
      .menu-item { justify-content: center; padding: 12px 0; }
      .content { padding: 16px 12px; }
      .metrics-row { flex-direction: column; }
    }

    /* 加载动画 */
    .spinner {
      width: 24px; height: 24px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite; margin: auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-box { display: flex; align-items: center; justify-content: center; height: 100px;
                   color: var(--muted); gap: 10px; font-size: 13px; }
  </style>
</head>
<body>

<!-- 顶部导航 -->
<div class="topbar">
  <div class="topbar-logo">📊 套利监控</div>
  <div class="topbar-sub">多策略期货价差</div>
  <div class="topbar-right">
    <div class="topbar-time" id="topTime">--</div>
    <button class="btn-refresh" onclick="refreshCurrent()">↻ 刷新</button>
  </div>
</div>

<!-- 主体 -->
<div class="layout">
  <!-- 左侧菜单 -->
  <div class="sidebar" id="sidebar">
    <div id="menuContent">
      <div class="loading-box"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- 右侧详情 -->
  <div class="content" id="content">
    <div class="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 3h18v18H3z" rx="2"/><path d="M8 12h8M8 8h5M8 16h3"/>
      </svg>
      <div>从左侧选择一个品种查看详情</div>
    </div>
  </div>
</div>

<script>
// ────────────────────────────────────────────
// 状态
// ────────────────────────────────────────────
let strategies = [];
let currentId  = null;
let currentChart = null;
let currentYears = 3;
let refreshTimer = null;

const CATEGORY_ICON = {
  rubber:        '🌿',
  equity_index:  '📈',
  processing:    '🏭',
  cross_product: '🔄',
  calendar:      '📅',
};
const CATEGORY_LABEL = {
  rubber:        '橡胶套利',
  equity_index:  '股指期货',
  processing:    '加工费套利',
  cross_product: '跨品种套利',
  calendar:      '跨期价差',
};
const CAT_ORDER = ['rubber','equity_index','processing','cross_product','calendar'];
const CALENDAR_SYMBOLS = ['PP','BU','FU'];

// 语义色
const C = { sell:'#d32f2f', buy:'#1a7f4b', warn:'#b45309', neu:'#6b7a94', line:'#3b6cf4', muted:'#b0bac9' };

// ────────────────────────────────────────────
// 初始化
// ────────────────────────────────────────────
async function init() {
  try {
    const res  = await fetch('/api/strategies');
    const data = await res.json();
    strategies = data.strategies || [];
    renderMenu();
    updateTime();
    setInterval(updateTime, 30000);

    // 默认选第一个
    if (strategies.length > 0) selectStrategy(strategies[0].id);
  } catch(e) {
    document.getElementById('menuContent').innerHTML =
      `<div style="padding:20px;font-size:12px;color:#d32f2f">加载失败<br>${e.message}</div>`;
  }
}

function updateTime() {
  document.getElementById('topTime').textContent =
    new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ────────────────────────────────────────────
// 渲染左侧菜单
// ────────────────────────────────────────────
function renderMenu() {
  const container = document.getElementById('menuContent');
  container.innerHTML = '';

  // 按分类分组
  CAT_ORDER.forEach(cat => {
    const items = strategies.filter(s => s.category === cat);
    if (cat === 'calendar') {
      // 跨期价差用固定3个
      const group = document.createElement('div');
      group.className = 'menu-group';
      group.innerHTML = `<div class="menu-group-title">${CATEGORY_ICON[cat]} ${CATEGORY_LABEL[cat]}</div>`;
      CALENDAR_SYMBOLS.forEach(sym => {
        const item = document.createElement('div');
        item.className = 'menu-item';
        item.id = `menu_cal_${sym}`;
        item.dataset.calSym = sym;
        item.onclick = () => selectCalendar(sym);
        item.innerHTML = `<span>${sym} 跨期价差</span>`;
        group.appendChild(item);
      });
      container.appendChild(group);
      return;
    }
    if (!items.length) return;
    const group = document.createElement('div');
    group.className = 'menu-group';
    group.innerHTML = `<div class="menu-group-title">${CATEGORY_ICON[cat]} ${CATEGORY_LABEL[cat]}</div>`;
    items.forEach(s => {
      const item = document.createElement('div');
      item.className = 'menu-item';
      item.id = `menu_${s.id}`;
      item.dataset.stratId = s.id;
      item.onclick = () => selectStrategy(s.id);
      item.innerHTML = `<span>${s.name}</span><span class="badge badge-load" id="badge_${s.id}">…</span>`;
      group.appendChild(item);
    });
    container.appendChild(group);
  });

  // 异步加载所有 badge（只拿 summary，避免全量数据）
  strategies.forEach(s => loadBadge(s));
}

async function loadBadge(s) {
  try {
    const res  = await fetch(`/api/spread?id=${s.id}&years=3`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const sig  = data.signal || 'neutral';
    const badge = document.getElementById(`badge_${s.id}`);
    if (!badge) return;
    if (sig === 'high') {
      badge.textContent = '偏高';
      badge.className   = 'badge badge-sell';
    } else if (sig === 'low') {
      badge.textContent = '偏低';
      badge.className   = 'badge badge-buy';
    } else {
      badge.textContent = '中性';
      badge.className   = 'badge badge-neu';
    }
  } catch(e) {
    const badge = document.getElementById(`badge_${s.id}`);
    if (badge) { badge.textContent = '--'; badge.className = 'badge badge-neu'; }
  }
}

// ────────────────────────────────────────────
// 选中策略 → 渲染详情
// ────────────────────────────────────────────
function selectStrategy(id) {
  currentId   = id;
  currentYears = 3;
  // 高亮菜单
  document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
  const mi = document.getElementById(`menu_${id}`);
  if (mi) mi.classList.add('active');

  showLoading();
  loadDetail(id, currentYears);
}

function showLoading() {
  const content = document.getElementById('content');
  content.innerHTML = `<div class="loading-box" style="height:60vh"><div class="spinner"></div><span>加载中...</span></div>`;
  if (currentChart) { currentChart.dispose(); currentChart = null; }
}

async function loadDetail(id, years) {
  try {
    const res  = await fetch(`/api/spread?id=${id}&years=${years}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const s    = strategies.find(x => x.id === id);
    renderDetail(s, data, years);
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div style="padding:40px;color:var(--c-sell);text-align:center">
        ❌ 加载失败: ${e.message}<br>
        <button onclick="loadDetail('${id}',3)" style="margin-top:12px;padding:6px 14px;cursor:pointer;border:1px solid #ddd;border-radius:6px">重试</button>
      </div>`;
  }
}

function renderDetail(s, data, years) {
  if (!s || !data) return;
  const { stats, dates, spreads } = data;
  // signal 优先用 data.signal（API 顶层），其次 stats.signal
  const signal = data.signal || (stats && stats.signal) || 'neutral';
  const cur    = stats ? stats.current : 0;
  const pct    = stats ? stats.percentile : 50;
  const z      = stats ? stats.zscore : 0;
  const mean   = stats ? stats.mean  : 0;
  const std    = stats ? stats.std   : 0;
  const bbU    = stats ? stats.bb_upper : null;
  const bbL    = stats ? stats.bb_lower : null;
  const bbM    = stats ? stats.bb_mid   : null;
  const legs   = data.legs || [];
  const desc   = data.description || s.description || '';

  const sigCls  = signal === 'high' ? 'sell' : signal === 'low' ? 'buy' : 'neu';
  const sigIcon = signal === 'high' ? '📉' : signal === 'low' ? '📈' : '⏸';
  const sigText = signal === 'high' ? `价差偏高（P${pct.toFixed(0)}%），考虑做空 ${s.name}` :
                  signal === 'low'  ? `价差偏低（P${pct.toFixed(0)}%），考虑做多 ${s.name}` :
                                      `价差处于中性区间（P${pct.toFixed(0)}%），建议观望`;

  const valCls = signal === 'high' ? 'val-sell' : signal === 'low' ? 'val-buy' : 'val-neu';
  const pctCls = pct > 80 ? 'val-sell' : pct < 20 ? 'val-buy' : 'val-neu';
  const zCls   = Math.abs(z) >= 1.5 ? 'val-warn' : 'val-neu';
  const curFmt = `${cur >= 0 ? '+' : ''}${cur.toFixed(0)}`;
  const pbarL  = Math.min(Math.max(pct, 2), 98).toFixed(1);

  const yearBtns = [1,2,3].map(y =>
    `<button class="year-btn${y===years?' active':''}" onclick="changeYears(${y})">${y}年</button>`
  ).join('');

  // 各腿价格行
  const legRows = legs.map(lg => {
    const coefStr = lg.coef > 0 ? `×${lg.coef}` : `×(${lg.coef})`;
    return `<tr>
      <td style="color:var(--sub)">${lg.label}</td>
      <td><code style="font-size:12px;color:var(--muted)">${lg.symbol} ${coefStr}</code></td>
      <td><b>${lg.last_price != null ? lg.last_price.toLocaleString() : '--'}</b></td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${CATEGORY_ICON[s.category] || ''} ${s.name}</div>
      <div class="detail-formula">${s.formula || data.formula || ''}</div>
    </div>

    <!-- ① 操作信号（最重要） -->
    <div class="signal-box ${sigCls}" style="margin-bottom:16px">
      <div class="signal-icon">${sigIcon}</div>
      <div class="signal-text">
        <div class="signal-action">${sigText}</div>
        ${desc ? `<div class="signal-desc" style="margin-top:4px">${desc.replace(/\n/g,'<br>')}</div>` : ''}
      </div>
    </div>

    <!-- ② 核心指标 4格 -->
    <div class="metrics-row">
      <div class="metric-card">
        <div class="metric-card-label">当前价差</div>
        <div class="metric-card-value ${valCls}">${curFmt}</div>
        <div class="metric-card-unit">${s.unit || data.unit || ''}</div>
      </div>
      <div class="metric-card">
        <div class="metric-card-label">历史分位</div>
        <div class="metric-card-value ${pctCls}">P${pct.toFixed(1)}%</div>
        <div class="metric-card-unit">越高越偏贵</div>
      </div>
      <div class="metric-card">
        <div class="metric-card-label">Z-Score</div>
        <div class="metric-card-value ${zCls}">${z >= 0 ? '+' : ''}${z.toFixed(2)}σ</div>
        <div class="metric-card-unit">偏离均值幅度</div>
      </div>
      <div class="metric-card">
        <div class="metric-card-label">均值 / 1σ</div>
        <div class="metric-card-value val-neu" style="font-size:18px">
          ${mean.toFixed(0)}
          <span style="font-size:12px;color:var(--muted)"> ±${std.toFixed(0)}</span>
        </div>
        <div class="metric-card-unit">${s.unit || data.unit || ''}</div>
      </div>
    </div>

    <!-- ③ 分位进度条 -->
    <div class="pbar-wrap">
      <div class="pbar-header">
        <span class="pbar-label">历史分位位置（近${years}年）</span>
        <span class="pbar-val ${pctCls}">P${pct.toFixed(1)}%</span>
      </div>
      <div class="pbar-track">
        <div class="pbar-fill" style="width:100%"></div>
        <div class="pbar-dot" style="left:${pbarL}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px">
        <span style="color:var(--c-buy)">偏低/做多</span>
        <span>中性区间</span>
        <span style="color:var(--c-sell)">偏高/做空</span>
      </div>
    </div>

    <!-- ④ 历史走势图（含布林带） -->
    <div class="chart-card">
      <div class="chart-card-header">
        <div class="chart-card-title">历史价差走势（含布林带 ±2σ）</div>
        <div class="chart-years">${yearBtns}</div>
      </div>
      <div class="chart-body" id="mainChart"></div>
    </div>

    <!-- ⑤ 统计数据表 -->
    <div class="stats-table">
      <table>
        <tr><th colspan="3" style="background:#f0f2f5">价差统计</th></tr>
        <tr><th>指标</th><th>数值</th><th>说明</th></tr>
        <tr><td>当前价差</td>
            <td><b class="${valCls}">${curFmt} ${s.unit||''}</b></td>
            <td>最新计算值</td></tr>
        <tr><td>历史分位</td>
            <td><b class="${pctCls}">P${pct.toFixed(1)}%</b></td>
            <td>近${years}年分位</td></tr>
        <tr><td>Z-Score</td>
            <td><b class="${zCls}">${z>=0?'+':''}${z.toFixed(2)}σ</b></td>
            <td>|Z|>2 极端值</td></tr>
        <tr><td>历史均值</td>
            <td>${mean.toFixed(1)} ${s.unit||''}</td>
            <td>近${years}年均值</td></tr>
        <tr><td>标准差</td>
            <td>±${std.toFixed(1)} ${s.unit||''}</td>
            <td>波动参考</td></tr>
        <tr><td>历史最高</td>
            <td>${stats && stats.max != null ? stats.max.toFixed(0) : '--'} ${s.unit||''}</td>
            <td>近${years}年</td></tr>
        <tr><td>历史最低</td>
            <td>${stats && stats.min != null ? stats.min.toFixed(0) : '--'} ${s.unit||''}</td>
            <td>近${years}年</td></tr>
        <tr><td>布林上轨</td>
            <td>${bbU && bbU.length ? (bbU[bbU.length-1]||0).toFixed(0) : '--'} ${s.unit||''}</td>
            <td>20日均值+2σ</td></tr>
        <tr><td>布林下轨</td>
            <td>${bbL && bbL.length ? (bbL[bbL.length-1]||0).toFixed(0) : '--'} ${s.unit||''}</td>
            <td>20日均值-2σ</td></tr>
      </table>
    </div>

    <!-- ⑥ 各腿价格 -->
    ${legRows ? `
    <div class="stats-table">
      <table>
        <tr><th colspan="3" style="background:#f0f2f5">各腿当前价格</th></tr>
        <tr><th>合约</th><th>规则</th><th>最新价</th></tr>
        ${legRows}
      </table>
    </div>` : ''}
  `;

  // ── 渲染图表 ──
  if (dates && spreads && dates.length > 0) {
    if (currentChart) { currentChart.dispose(); currentChart = null; }
    currentChart = echarts.init(document.getElementById('mainChart'));

    const series = [
      {
        name: '价差', type: 'line', data: spreads, symbol: 'none', z: 3,
        lineStyle: { color: C.line, width: 2 },
        areaStyle: { color: { type:'linear', x:0, y:0, x2:0, y2:1,
          colorStops: [{offset:0,color:'rgba(59,108,244,.18)'},{offset:1,color:'rgba(59,108,244,0)'}] }}
      },
      {
        name: '均值', type: 'line', symbol: 'none', z: 1,
        data: new Array(dates.length).fill(mean),
        lineStyle: { color: C.muted, width: 1, type:'dashed' }
      },
    ];

    // 布林带
    if (bbU && bbU.length === dates.length) {
      series.push({
        name: '布林上轨', type:'line', symbol:'none', z: 1,
        data: bbU,
        lineStyle: { color: C.sell, width: 1, type:'dotted', opacity: .7 }
      });
      series.push({
        name: '布林下轨', type:'line', symbol:'none', z: 1,
        data: bbL,
        lineStyle: { color: C.buy, width: 1, type:'dotted', opacity: .7 }
      });
    }

    currentChart.setOption({
      backgroundColor: 'transparent',
      legend: { data: ['价差','均值','布林上轨','布林下轨'], textStyle:{fontSize:10,color:C.muted},
                top: 4, right: 80, icon: 'roundRect', itemWidth:14, itemHeight:4 },
      grid: { left: 52, right: 16, top: 32, bottom: 36 },
      tooltip: {
        trigger: 'axis', textStyle: { fontSize: 12 },
        backgroundColor: '#fff', borderColor: '#e8ecf2',
        extraCssText: 'box-shadow:0 2px 10px rgba(0,0,0,.1)',
        formatter: params => {
          let html = `<b>${params[0]?.axisValue}</b><br/>`;
          params.forEach(p => {
            if (p.value != null)
              html += `${p.marker}${p.seriesName}: <b>${Number(p.value).toFixed(0)}</b><br/>`;
          });
          return html;
        }
      },
      xAxis: {
        type: 'category', data: dates,
        axisLabel: { fontSize: 10, color: C.muted,
          interval: Math.floor(dates.length / 5),
          formatter: v => v ? v.slice(2,7) : '' },
        axisLine: { lineStyle: { color: '#e8ecf2' } }, splitLine: { show: false }
      },
      yAxis: {
        type: 'value', scale: true,
        axisLabel: { fontSize: 10, color: C.muted,
          formatter: v => Math.abs(v)>=1000 ? (v/1000).toFixed(1)+'k' : v },
        splitLine: { lineStyle: { color: '#f1f5f9', type:'dashed' } }
      },
      series
    });
    window.addEventListener('resize', () => { if(currentChart) currentChart.resize(); });
  }
}

// ────────────────────────────────────────────
// 跨期价差详情
// ────────────────────────────────────────────
async function selectCalendar(sym) {
  currentId = `cal_${sym}`;
  document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
  const mi = document.getElementById(`menu_cal_${sym}`);
  if (mi) mi.classList.add('active');

  showLoading();
  try {
    const res  = await fetch(`/api/calendar_spread?symbol=${sym}&years=3`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderCalendarDetail(sym, data);
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div style="padding:40px;color:var(--c-sell);text-align:center">❌ 加载失败: ${e.message}</div>`;
  }
}

function renderCalendarDetail(sym, data) {
  const content = document.getElementById('content');
  if (data.error || !data.supported) {
    content.innerHTML = `
      <div class="detail-header">
        <div class="detail-title">📅 ${sym} 跨期价差</div>
        <div class="detail-formula">近月 − 各远月</div>
      </div>
      <div class="desc-box">${data.error || '暂不支持此品种的跨期数据'}</div>`;
    return;
  }

  const spreads = data.realtime_spreads || [];
  const rows = spreads.map(sp => {
    const col = sp.spread > 0 ? 'val-sell' : 'val-buy';
    const dir = sp.spread > 0 ? '正向（现货升水）' : '反向（现货贴水）';
    return `<tr>
      <td>${sp.label}</td>
      <td><b class="${col}">${sp.spread >= 0 ? '+' : ''}${sp.spread.toFixed(0)}</b></td>
      <td>${dir}</td>
    </tr>`;
  }).join('');

  content.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">📅 ${sym} 跨期价差</div>
      <div class="detail-formula">近月合约 − 远月合约（正数=现货升水，负数=现货贴水）</div>
    </div>
    <div class="stats-table">
      <table class="spread-table">
        <tr><th>合约对</th><th>价差</th><th>结构</th></tr>
        ${rows || '<tr><td colspan="3" style="text-align:center;color:var(--muted)">暂无数据</td></tr>'}
      </table>
    </div>
    <div class="desc-box">
      跨期价差反映市场对近远期供需预期差异。<br>
      正数（现货升水）：近月比远月贵，市场存在近期供应紧张预期。<br>
      负数（现货贴水）：近月比远月便宜，市场存在近期供应宽松预期。<br>
      实际操作需结合持仓成本和库存数据综合判断。
    </div>`;
}

// ────────────────────────────────────────────
// 切换年份
// ────────────────────────────────────────────
function changeYears(y) {
  currentYears = y;
  if (!currentId || currentId.startsWith('cal_')) return;
  showLoading();
  loadDetail(currentId, y);
}

// ────────────────────────────────────────────
// 刷新当前
// ────────────────────────────────────────────
function refreshCurrent() {
  if (!currentId) return;
  if (currentId.startsWith('cal_')) {
    selectCalendar(currentId.replace('cal_',''));
  } else {
    showLoading();
    loadDetail(currentId, currentYears);
  }
  // 同步刷新所有 badge
  strategies.forEach(s => loadBadge(s));
}

// 启动
window.addEventListener('load', init);
</script>
</body>
</html>
